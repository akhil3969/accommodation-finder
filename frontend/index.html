<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏠 Accommodation Finder</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="logo">🏠 AccomFinder</div>
    <nav>
        <a href="#">Search</a>
        <a href="#">My Bookings</a>
        <a href="#">List a Room</a>
        <button class="btn-login">Login</button>
    </nav>
</header>

<main>
    <!-- Search Bar -->
    <section class="hero">
        <h1>Find Your Perfect Room</h1>
        <p>Real-time availability. Instant booking.</p>
        <div class="search-bar">
            <input type="text" id="city" placeholder="City (e.g. Paris, Le Kremlin-Bicêtre)" />
            <input type="number" id="maxPrice" placeholder="Max price (€/month)" />
            <select id="roomType">
                <option value="">Any type</option>
                <option value="STUDIO">Studio</option>
                <option value="SHARED">Shared Room</option>
                <option value="APARTMENT">Apartment</option>
            </select>
            <button onclick="searchRooms()">🔍 Search</button>
        </div>
    </section>

    <!-- Real-time status bar -->
    <div class="realtime-bar">
        <span id="connection-status" class="status-dot disconnected"></span>
        <span id="status-text">Connecting to live updates...</span>
        <span id="live-count">0 rooms available</span>
    </div>

    <!-- Results + Map -->
    <section class="content">
        <div class="room-list" id="roomList">
            <p class="loading">Search for rooms to see results...</p>
            
        </div>
        <div id="map"></div>
    </section>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script src="js/map.js"></script>
<script src="js/websocket.js"></script>
<script src="js/app.js"></script>
</body>
</html>
